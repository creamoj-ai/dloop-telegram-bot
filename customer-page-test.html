<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Completa il tuo ordine | Dloop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
      padding: 20px 16px;
    }
    .container {
      max-width: 500px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #FF6B00;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-bottom: 24px;
    }
    .order-info {
      background: #f9f9f9;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .order-info strong {
      color: #FF6B00;
    }
    .errors {
      background: #ffebee;
      color: #c62828;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .errors ul {
      margin-left: 20px;
    }
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
      color: #333;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
      margin-bottom: 16px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #FF6B00;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .optional {
      font-weight: normal;
      color: #999;
      font-size: 12px;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #FF6B00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:active {
      background: #e66000;
    }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: -12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 Completa il tuo ordine</h1>
    <p class="subtitle">Inserisci i dettagli di consegna per ricevere il pacco</p>

    <div class="order-info">
      <strong>Dettagli ordine:</strong><br>
      📦 Taglia: L<br>
      📍 Ritiro: via Roma 10<br>
      💳 Pagamento: Cliente paga al rider
    </div>

    

    <form method="POST" action="/c/3s5ymymh">
      <label for="recipient_name">Nome destinatario *</label>
      <input
        type="text"
        id="recipient_name"
        name="recipient_name"
        required
        placeholder="Mario Rossi"
        value=""
      >

      <label for="recipient_phone">Telefono *</label>
      <input
        type="tel"
        id="recipient_phone"
        name="recipient_phone"
        required
        placeholder="+39 333 1234567"
        value=""
      >
      <p class="hint">Formato: +39 3xx xxxxxxx</p>

      <label for="delivery_address">Indirizzo di consegna *</label>
      <textarea
        id="delivery_address"
        name="delivery_address"
        required
        placeholder="Via Roma 123, 80100 Napoli (NA)"
      ></textarea>

      <label for="notes">Note <span class="optional">(opzionale)</span></label>
      <textarea
        id="notes"
        name="notes"
        placeholder="Es: citofono, piano, istruzioni particolari..."
      ></textarea>

      <button type="submit">✅ Conferma ordine</button>
    </form>
  </div>
</body>
</html>
